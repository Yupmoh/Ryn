name: Regenerate Bindings

on:
  push:
    paths:
      - "vendor/saucer-bindings/**"
      - "build/clangsharp/**"
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  regenerate:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install LLVM 21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main"
          sudo apt-get update
          sudo apt-get install -y libclang-21-dev

      - name: Install ClangSharp
        run: dotnet tool install --global ClangSharpPInvokeGenerator

      - name: Regenerate bindings
        run: bash build/regenerate-bindings.sh

      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code src/Ryn.Interop/Generated/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="auto/update-bindings-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add src/Ryn.Interop/Generated/
          git commit -m "chore: regenerate saucer bindings

          - Auto-generated via ClangSharp from updated saucer headers"
          git push origin "$BRANCH"
          gh pr create --title "chore: regenerate saucer bindings" --body "Automated binding regeneration triggered by saucer submodule or ClangSharp config update." --base main --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
